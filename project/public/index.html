<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCP Sunrise Travel | Inquiry</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <h1>Travel Inquiry Form</h1>
    <section class="card">
      <form id="inquiryForm" class="grid grid-2">
        <div><label>Name</label><input name="name" required /></div>
        <div><label>Email</label><input type="email" name="email" required /></div>
        <div><label>Phone</label><input name="phone" required /></div>
        <div><label>Destination</label><input name="destination" required /></div>
        <div><label>Travel Date</label><input type="date" name="travelDate" required /></div>
        <div class="grid" style="grid-column: 1/-1;"><label>Message</label><textarea name="message"></textarea></div>
        <button type="submit">Submit Inquiry</button>
      </form>
      <p id="inquiryMessage" class="message"></p>
      <p class="small">Need to reserve right away? <a href="/booking.html">Submit a booking request</a>.</p>
    </section>
  </main>
  <script src="/script.js"></script>
</body>
</html>

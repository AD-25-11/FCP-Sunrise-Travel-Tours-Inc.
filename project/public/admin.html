<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCP Sunrise Travel Admin Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main id="adminDashboard" class="container">
    <div class="topbar">
      <h1>FCP Sunrise Travel & Tours Admin Dashboard</h1>
      <button id="logoutBtn" class="inline btn-secondary">Logout</button>
    </div>

    <section class="grid grid-4 stats">
      <article class="card"><p>Total Inquiries</p><div id="totalInquiries" class="value">0</div></article>
      <article class="card"><p>Total Bookings</p><div id="totalBookings" class="value">0</div></article>
    </section>

    <section class="card" style="margin-top: 1rem;">
      <label>Search by customer, destination, or email</label>
      <input id="searchInput" placeholder="Start typing..." />
    </section>

    <section class="card" style="margin-top: 1rem;">
      <h2>Inquiries</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Customer Name</th>
              <th>Destination</th>
              <th>Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="inquiryRows"></tbody>
        </table>
      </div>
    </section>

    <section class="card" style="margin-top: 1rem;">
      <h2>Booking Requests</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Customer Name</th>
              <th>Destination</th>
              <th>Date</th>
              <th>Travelers</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookingRows"></tbody>
        </table>
      </div>
    </section>

    <section id="customerDetails" class="card hidden" style="margin-top: 1rem;"></section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/script.js"></script>
</body>
</html>
